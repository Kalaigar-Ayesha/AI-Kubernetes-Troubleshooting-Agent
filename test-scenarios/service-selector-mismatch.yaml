apiVersion: apps/v1
kind: Deployment
metadata:
  name: selector-mismatch-demo
  namespace: default
  labels:
    app: selector-mismatch-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: selector-mismatch-demo
  template:
    metadata:
      labels:
        app: selector-mismatch-demo
    spec:
      containers:
      - name: app
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: selector-mismatch-svc
  namespace: default
spec:
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  selector:
    app: mismatched-app-selector
